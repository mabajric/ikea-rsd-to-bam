<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IKEA RSD to BAM Converter - Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      background-color: #f5f5f5;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      color: #0058a3;
      margin-top: 0;
      font-size: 24px;
    }

    .option-group {
      margin: 20px 0;
    }

    label {
      display: block;
      margin: 10px 0;
      cursor: pointer;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 4px;
      transition: all 0.2s;
    }

    label:hover {
      background-color: #f9f9f9;
      border-color: #0058a3;
    }

    input[type="radio"] {
      margin-right: 10px;
    }

    input[type="radio"]:checked + span {
      font-weight: bold;
      color: #0058a3;
    }

    .description {
      margin-left: 28px;
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }

    .save-button {
      background-color: #0058a3;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
      transition: background-color 0.2s;
    }

    .save-button:hover {
      background-color: #004080;
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }

    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>IKEA RSD to BAM Converter Settings</h1>

    <div class="option-group">
      <h3>Price Display Mode</h3>
      <label>
        <input type="radio" name="displayMode" value="alongside" id="alongside">
        <span>Show alongside original price</span>
        <div class="description">Displays the converted BAM price next to the original RSD price</div>
      </label>

      <label>
        <input type="radio" name="displayMode" value="replace" id="replace">
        <span>Replace original price</span>
        <div class="description">Completely replaces the RSD price with BAM price and changes currency to KM</div>
      </label>
    </div>

    <button class="save-button" id="save">Save Settings</button>
    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
